<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soefit - Painel Admin</title>
    <link rel="stylesheet" href="../../Css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1 class="logo-text" style="font-size: 1.8rem; margin: 0;">Soefit <span style="color:#fff; font-size:1rem; font-weight: 400;">| GESTÃO</span></h1>
            <div class="user-info">
                <button id="btn-voltar" class="btn-small" style="background-color: #333;">
                    <i class="fa-solid fa-arrow-left"></i> Tela de Login
                </button>
            </div>
        </div>
    </header>

    <main class="container" style="flex-direction: column;">
        <section class="list-section" style="width: 100%;">
            <h2 class="section-title">Alunos Matriculados</h2>
            
            <div style="overflow-x: auto;">
                <table style="width: 100%; text-align: left; border-collapse: collapse; color: var(--text-light); min-width: 600px;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--primary-orange);">
                            <th style="padding: 15px 10px;">ID</th>
                            <th style="padding: 15px 10px;">Nome do Aluno</th>
                            <th style="padding: 15px 10px;">E-mail</th>
                            <th style="padding: 15px 10px;">Fichas Ativas</th>
                            <th style="padding: 15px 10px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-usuarios">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../../Controller/adminController.js"></script>
</body>
</html>
